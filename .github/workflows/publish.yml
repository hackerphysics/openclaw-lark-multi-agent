name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 includes a recent npm CLI with Trusted Publishing/OIDC support.
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm pack --dry-run
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package version $VERSION" >&2
            exit 1
          fi
      # Keep provenance off while the GitHub repository is private. npm provenance
      # currently requires a public source repository. Once the repo is public,
      # change this back to: npm publish --access public --provenance
      - run: npm publish --access public
